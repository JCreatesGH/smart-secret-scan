<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420" font-family="SFMono-Regular,Consolas,Menlo,monospace">
  <rect width="800" height="420" rx="10" fill="#11111b"/>
  <rect width="800" height="34" rx="10" fill="#313244"/><rect y="20" width="800" height="14" fill="#313244"/>
  <circle cx="20" cy="17" r="6" fill="#f38ba8"/><circle cx="40" cy="17" r="6" fill="#f9e2af"/><circle cx="60" cy="17" r="6" fill="#a6e3a1"/>
  <text x="400" y="22" fill="#bac2de" font-size="12" text-anchor="middle">sentinel — git pre-commit</text>
  <text font-size="12.5" xml:space="preserve">
    <tspan x="18" y="62" fill="#a6e3a1">$ </tspan><tspan fill="#cdd6f4">git commit -m "add integration"</tspan>
    <tspan x="18" y="84" fill="#6c7086">sentinel secret scan....................................Failed</tspan>
    <tspan x="18" y="112" fill="#f38ba8">HIGH  </tspan><tspan fill="#cdd6f4"> github-pat      config.py:12   </tspan><tspan fill="#6c7086">ghp_…aZ  (fp 9c1a2b4d)</tspan>
    <tspan x="18" y="132" fill="#f38ba8">HIGH  </tspan><tspan fill="#cdd6f4"> aws-access-key  deploy.sh:4    </tspan><tspan fill="#6c7086">AKIA…OP  (fp 71ef03aa)</tspan>
    <tspan x="18" y="152" fill="#f9e2af">MEDIUM</tspan><tspan fill="#cdd6f4"> assigned-secret app.py:88     </tspan><tspan fill="#6c7086">Tr0u…9Z  (fp 4d8c10b2)</tspan>
    <tspan x="18" y="180" fill="#f38ba8">3 potential secret(s) found.</tspan><tspan fill="#cdd6f4"> Real? remove them.</tspan>
    <tspan x="18" y="200" fill="#cdd6f4">False positive? run with --update-baseline.</tspan>
    <tspan x="18" y="236" fill="#6c7086"># that example/test token is a known false positive:</tspan>
    <tspan x="18" y="258" fill="#a6e3a1">$ </tspan><tspan fill="#cdd6f4">sentinel --update-baseline tests/fixtures.py</tspan>
    <tspan x="18" y="278" fill="#cdd6f4">baseline updated -> .secrets.baseline.json</tspan>
    <tspan x="18" y="306" fill="#a6e3a1">$ </tspan><tspan fill="#cdd6f4">git commit -m "add integration"</tspan>
    <tspan x="18" y="326" fill="#a6e3a1">sentinel secret scan....................................Passed</tspan>
    <tspan x="18" y="354" fill="#6c7086"># learns your false positives by (file, secret) fingerprint — stops crying wolf</tspan>
    <tspan x="18" y="382" fill="#a6e3a1">✓ 10 tests · GitHub/AWS/Slack/Stripe/JWT/private-key rules + entropy fallback</tspan>
  </text>
</svg>
